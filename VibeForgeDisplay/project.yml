name: VibeForgeDisplay
options:
  bundleIdPrefix: com.vibeforge
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.vibeforge.display
    PRODUCT_NAME: VibeForge Display
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: VibeForgeDisplay/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  VibeForgeDisplay:
    type: application
    platform: macOS
    sources:
      - path: VibeForgeDisplay/Sources
    resources:
      - path: VibeForgeDisplay/Resources
    info:
      path: VibeForgeDisplay/Info.plist
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
